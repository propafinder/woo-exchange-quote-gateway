# При пуше в main: создать тег из Version в плагине и запустить релиз (тег триггерит release.yml)
name: Release on Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get plugin version
        id: version
        run: |
          V=$(grep "Version:" woo-exchange-quote-gateway.php | head -1 | sed -n 's/.*Version:[[:space:]]*\([0-9][0-9.]*\).*/\1/p' | tr -d ' \r')
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Plugin version: $V"

      - name: Create and push tag if new
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "$VERSION" ]; then echo "Could not read version"; exit 1; fi
          git fetch --tags 2>/dev/null || true
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, release will not be recreated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"
