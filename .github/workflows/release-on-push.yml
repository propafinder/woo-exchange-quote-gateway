# При пуше в main: следующая версия (patch+1), релиз с zip, коммит версии с [skip ci]
name: Release on Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          CURRENT=$(grep "Version:" woo-exchange-quote-gateway.php | head -1 | sed -n 's/.*Version:[[:space:]]*\([0-9][0-9.]*\).*/\1/p' | tr -d ' \r')
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          # Последний тег через API (jq есть на ubuntu-latest)
          RESP=$(curl -sS -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" || true)
          LATEST_TAG=$(echo "$RESP" | jq -r '.tag_name // empty' | sed 's/^v//')
          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="$CURRENT"
          else
            MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
            [ -z "$PATCH" ] && PATCH=0
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEW_VERSION (current in file: $CURRENT)"

      - name: Bump version in plugin file
        run: |
          V="${{ steps.version.outputs.version }}"
          sed -i "s/\(Version:[[:space:]]*\)[0-9][0-9.]*/\1$V/" woo-exchange-quote-gateway.php
          grep "Version:" woo-exchange-quote-gateway.php | head -1

      - name: Build plugin zip
        run: |
          mkdir -p staging/woo-exchange-quote-gateway
          for f in *.php *.md; do [ -f "$f" ] && cp "$f" staging/woo-exchange-quote-gateway/; done
          [ -d includes ] && cp -r includes staging/woo-exchange-quote-gateway/
          [ -d assets ] && cp -r assets staging/woo-exchange-quote-gateway/
          [ -d docs ] && cp -r docs staging/woo-exchange-quote-gateway/
          rm -rf staging/woo-exchange-quote-gateway/.git staging/woo-exchange-quote-gateway/.github 2>/dev/null || true
          cd staging && zip -r ../woo-exchange-quote-gateway.zip woo-exchange-quote-gateway

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: woo-exchange-quote-gateway.zip
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add woo-exchange-quote-gateway.php
          if git diff --staged --quiet; then
            echo "No version change to commit"
            exit 0
          fi
          git commit -m "[skip ci] Bump version to ${{ steps.version.outputs.version }}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main