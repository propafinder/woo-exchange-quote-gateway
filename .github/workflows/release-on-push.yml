# При пуше в main: собрать zip и создать/обновить релиз v{Version} (тег создаёт action-gh-release)
name: Release on Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get plugin version
        id: version
        run: |
          V=$(grep "Version:" woo-exchange-quote-gateway.php | head -1 | sed -n 's/.*Version:[[:space:]]*\([0-9][0-9.]*\).*/\1/p' | tr -d ' \r')
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Plugin version: $V"

      - name: Build plugin zip
        run: |
          mkdir -p staging/woo-exchange-quote-gateway
          for f in *.php *.md; do [ -f "$f" ] && cp "$f" staging/woo-exchange-quote-gateway/; done
          [ -d includes ] && cp -r includes staging/woo-exchange-quote-gateway/
          [ -d assets ] && cp -r assets staging/woo-exchange-quote-gateway/
          [ -d docs ] && cp -r docs staging/woo-exchange-quote-gateway/
          rm -rf staging/woo-exchange-quote-gateway/.git staging/woo-exchange-quote-gateway/.github 2>/dev/null || true
          cd staging && zip -r ../woo-exchange-quote-gateway.zip woo-exchange-quote-gateway

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: woo-exchange-quote-gateway.zip
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
